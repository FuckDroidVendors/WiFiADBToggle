plugins {
    id 'com.android.application'
}

apply from: "${rootDir}/build-logic/select-mode.gradle"

android {
    namespace = 'fuck.wifiadbtoggle.droidvendorssuck'
    compileSdk = 36

    signingConfigs {
        debug {
        }
    }

    def adbPortProp = project.findProperty("adbPort")?.toString()
    def compileAdbPort = 5555
    if (adbPortProp) {
        try {
            def value = Integer.parseInt(adbPortProp)
            if (value > 0 && value <= 65535) {
                compileAdbPort = value
            }
        } catch (Exception ignored) {
        }
    }
    def autoBootEnabled = project.findProperty("autoboot")?.toString()?.toBoolean() == true
    def directBootEnabled = project.findProperty("directBoot")?.toString()?.toBoolean() == true
    def lockedBootEnabled = project.findProperty("lockedBoot")?.toString()?.toBoolean() == true
    def systemAppEnabled = project.findProperty("systemApp")?.toString()?.toBoolean() == true
    if (lockedBootEnabled) {
        directBootEnabled = true
    }
    def resLocaleProp = project.findProperty("resLocale")?.toString()
    def resDensitiesProp = project.findProperty("resDensities")?.toString()
    def resConfigsList = []
    def localeValue = (resLocaleProp == null || resLocaleProp.trim().isEmpty()) ? "en" : resLocaleProp.trim()
    if (localeValue != "all") {
        resConfigsList.addAll(localeValue.split(",").collect { it.trim() }.findAll { it })
    }
    def densitiesValue = resDensitiesProp?.trim()
    if (!densitiesValue && (requestedMode == "notify" || requestedMode == "headless")) {
        densitiesValue = "nodpi"
    }
    if (densitiesValue) {
        resConfigsList.addAll(densitiesValue.split(",").collect { it.trim() }.findAll { it })
    }

    defaultConfig {
        applicationId = "fuck.wifiadbtoggle.droidvendorssuck"
        minSdk = 17
        targetSdk = 36
        versionCode = 1
        versionName = "1.0"
        buildConfigField "int", "COMPILE_ADB_PORT", "${compileAdbPort}"
        buildConfigField "boolean", "AUTOBOOT_ENABLE_ADB", "${autoBootEnabled}"
        buildConfigField "boolean", "DIRECT_BOOT_AWARE", "${directBootEnabled}"
        buildConfigField "boolean", "LOCKED_BOOT_ENABLED", "${lockedBootEnabled}"
        buildConfigField "boolean", "SYSTEM_APP_BUILD", "${systemAppEnabled}"
        buildConfigField "boolean", "SETTINGS_UI", "true"
        buildConfigField "boolean", "NOTIFY_SINGLE_STATUS", "false"
        if (!resConfigsList.isEmpty()) {
            resConfigs(*resConfigsList)
        }
    }

    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            minifyEnabled = true
            shrinkResources = true
            signingConfig = signingConfigs.debug
            proguardFiles(
                getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro'
            )
        }
    }

    buildFeatures {
        buildConfig true
    }

    sourceSets {
        full.java.srcDirs += "src/ui/java"
        basic.java.srcDirs += "src/ui/java"
        tile.java.srcDirs += "src/ui/java"
        notifyconn.java.srcDirs += "src/ui/java"
        notify {
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/AdbConnectionUtils.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/AdbTileService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/BootReceiver.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/MainActivity.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/MediaButtonService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/MediaPattern.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/NetworkMonitorService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/QuickControlService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleAlarmReceiver.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleAlarmScheduler.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleDbHelper.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleEntry.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleManager.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleMode.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ShortcutActivity.java"
        }
        tile {
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/AdbConnectionUtils.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/AdbTileService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/BootReceiver.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/MainActivity.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/MediaButtonService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/MediaButtonTestActivity.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/MediaPattern.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/NetworkMonitorService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/NotificationHelper.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/QuickControlService.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleAlarmReceiver.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleAlarmScheduler.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleActivity.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleDbHelper.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleEntry.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleManager.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ScheduleMode.java"
            java.exclude "fuck/wifiadbtoggle/droidvendorssuck/ShortcutActivity.java"
        }
        full21 {
            java.srcDirs += "src/ui/java"
            java.srcDirs += "src/full/java"
            res.srcDirs += "src/full/res"
        }
    }

    flavorDimensions "mode"
    productFlavors {
        full {
            dimension "mode"
            buildConfigField "boolean", "FEATURE_NOTIFICATION", "true"
            buildConfigField "boolean", "FEATURE_CONNECTIONS", "true"
            buildConfigField "boolean", "FEATURE_TILE", "true"
            buildConfigField "boolean", "FEATURE_MEDIA", "true"
            buildConfigField "boolean", "FEATURE_SCHEDULE", "true"
            buildConfigField "boolean", "FEATURE_MONITOR", "true"
            buildConfigField "boolean", "FORCE_PERSISTENT_NOTIFICATION", "false"
            manifestPlaceholders = [
                enableTile: "true",
                enableMedia: "true",
                enableSchedule: "true",
                enableQuickControl: "true",
                enableMonitor: "true",
                enableBootReceiver: "true",
                directBootAware: "${directBootEnabled}"
            ]
        }
        full21 {
            dimension "mode"
            minSdk = 21
            buildConfigField "boolean", "FEATURE_NOTIFICATION", "true"
            buildConfigField "boolean", "FEATURE_CONNECTIONS", "true"
            buildConfigField "boolean", "FEATURE_TILE", "true"
            buildConfigField "boolean", "FEATURE_MEDIA", "true"
            buildConfigField "boolean", "FEATURE_SCHEDULE", "true"
            buildConfigField "boolean", "FEATURE_MONITOR", "true"
            buildConfigField "boolean", "FORCE_PERSISTENT_NOTIFICATION", "false"
            manifestPlaceholders = [
                enableTile: "true",
                enableMedia: "true",
                enableSchedule: "true",
                enableQuickControl: "true",
                enableMonitor: "true",
                enableBootReceiver: "true",
                directBootAware: "${directBootEnabled}"
            ]
        }
        notify {
            dimension "mode"
            buildConfigField "boolean", "FEATURE_NOTIFICATION", "true"
            buildConfigField "boolean", "FEATURE_CONNECTIONS", "false"
            buildConfigField "boolean", "FEATURE_TILE", "false"
            buildConfigField "boolean", "FEATURE_MEDIA", "false"
            buildConfigField "boolean", "FEATURE_SCHEDULE", "false"
            buildConfigField "boolean", "FEATURE_MONITOR", "false"
            buildConfigField "boolean", "FORCE_PERSISTENT_NOTIFICATION", "true"
            buildConfigField "boolean", "SETTINGS_UI", "false"
            buildConfigField "boolean", "NOTIFY_SINGLE_STATUS", "true"
            manifestPlaceholders = [
                enableTile: "false",
                enableMedia: "false",
                enableSchedule: "false",
                enableQuickControl: "true",
                enableMonitor: "false",
                enableBootReceiver: "true",
                directBootAware: "${directBootEnabled}"
            ]
        }
        notifyconn {
            dimension "mode"
            buildConfigField "boolean", "FEATURE_NOTIFICATION", "true"
            buildConfigField "boolean", "FEATURE_CONNECTIONS", "true"
            buildConfigField "boolean", "FEATURE_TILE", "false"
            buildConfigField "boolean", "FEATURE_MEDIA", "false"
            buildConfigField "boolean", "FEATURE_SCHEDULE", "false"
            buildConfigField "boolean", "FEATURE_MONITOR", "false"
            buildConfigField "boolean", "FORCE_PERSISTENT_NOTIFICATION", "false"
            manifestPlaceholders = [
                enableTile: "false",
                enableMedia: "false",
                enableSchedule: "false",
                enableQuickControl: "true",
                enableMonitor: "false",
                enableBootReceiver: "true",
                directBootAware: "${directBootEnabled}"
            ]
        }
        tile {
            dimension "mode"
            buildConfigField "boolean", "FEATURE_NOTIFICATION", "false"
            buildConfigField "boolean", "FEATURE_CONNECTIONS", "false"
            buildConfigField "boolean", "FEATURE_TILE", "true"
            buildConfigField "boolean", "FEATURE_MEDIA", "false"
            buildConfigField "boolean", "FEATURE_SCHEDULE", "false"
            buildConfigField "boolean", "FEATURE_MONITOR", "false"
            buildConfigField "boolean", "FORCE_PERSISTENT_NOTIFICATION", "false"
            buildConfigField "boolean", "SETTINGS_UI", "false"
            manifestPlaceholders = [
                enableTile: "true",
                enableMedia: "false",
                enableSchedule: "false",
                enableQuickControl: "false",
                enableMonitor: "false",
                enableBootReceiver: "true",
                directBootAware: "${directBootEnabled}"
            ]
        }
        basic {
            dimension "mode"
            buildConfigField "boolean", "FEATURE_NOTIFICATION", "true"
            buildConfigField "boolean", "FEATURE_CONNECTIONS", "false"
            buildConfigField "boolean", "FEATURE_TILE", "true"
            buildConfigField "boolean", "FEATURE_MEDIA", "false"
            buildConfigField "boolean", "FEATURE_SCHEDULE", "false"
            buildConfigField "boolean", "FEATURE_MONITOR", "true"
            buildConfigField "boolean", "FORCE_PERSISTENT_NOTIFICATION", "false"
            manifestPlaceholders = [
                enableTile: "true",
                enableMedia: "false",
                enableSchedule: "false",
                enableQuickControl: "true",
                enableMonitor: "true",
                enableBootReceiver: "true",
                directBootAware: "${directBootEnabled}"
            ]
        }
        headless {
            dimension "mode"
            buildConfigField "boolean", "FEATURE_NOTIFICATION", "false"
            buildConfigField "boolean", "FEATURE_CONNECTIONS", "false"
            buildConfigField "boolean", "FEATURE_TILE", "false"
            buildConfigField "boolean", "FEATURE_MEDIA", "false"
            buildConfigField "boolean", "FEATURE_SCHEDULE", "false"
            buildConfigField "boolean", "FEATURE_MONITOR", "false"
            buildConfigField "boolean", "FORCE_PERSISTENT_NOTIFICATION", "false"
            buildConfigField "boolean", "SETTINGS_UI", "false"
            manifestPlaceholders = [
                enableTile: "false",
                enableMedia: "false",
                enableSchedule: "false",
                enableQuickControl: "false",
                enableMonitor: "false",
                enableBootReceiver: "${autoBootEnabled}",
                directBootAware: "${directBootEnabled}"
            ]
        }
    }

    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            universalApk true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

androidComponents {
    beforeVariants(selector().all()) { variantBuilder ->
        if (requestedMode && variantBuilder.flavorName && variantBuilder.flavorName != requestedMode) {
            variantBuilder.enable = false
        }
    }
    onVariants(selector().all()) { variant ->
        def variantName = variant.name
        def capitalized = variantName.capitalize()
        def printTask = tasks.register("print${capitalized}ApkPath") {
            dependsOn("assemble${capitalized}")
            doLast {
                def apkDir = file("$buildDir/outputs/apk/$variantName")
                def apks = apkDir.exists() ? apkDir.listFiles().findAll { it.name.endsWith(".apk") } : []
                if (apks && !apks.isEmpty()) {
                    apks.each { println("APK[${variantName}]: ${it.absolutePath}") }
                } else {
                    println("APK[${variantName}]: not found (expected in ${apkDir})")
                }
            }
        }
        tasks.named("build").configure { finalizedBy(printTask) }
        tasks.named("assemble${capitalized}").configure { finalizedBy(printTask) }
    }
}

dependencies {
    fullImplementation "androidx.recyclerview:recyclerview:1.3.2"
    fullImplementation "androidx.media:media:1.2.1"
    full21Implementation "androidx.recyclerview:recyclerview:1.3.2"
    full21Implementation "androidx.media:media:1.2.1"
}

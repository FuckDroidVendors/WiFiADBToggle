plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.example.wifitoggle'
    compileSdk 34

    signingConfigs {
        debug {
        }
    }

    defaultConfig {
        applicationId "com.example.wifitoggle"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

androidComponents {
    onVariants(selector().all()) { variant ->
        def variantName = variant.name
        def capitalized = variantName.capitalize()
        def printTask = tasks.register("print${capitalized}ApkPath") {
            dependsOn("assemble${capitalized}")
            doLast {
                def apkDir = file("$buildDir/outputs/apk/$variantName")
                def apks = apkDir.exists() ? apkDir.listFiles().findAll { it.name.endsWith(".apk") } : []
                if (apks && !apks.isEmpty()) {
                    apks.each { println("APK[${variantName}]: ${it.absolutePath}") }
                } else {
                    println("APK[${variantName}]: not found (expected in ${apkDir})")
                }
            }
        }
        tasks.named("build").configure { finalizedBy(printTask) }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.11.0"

    // Shizuku
    implementation "dev.rikka.shizuku:api:13.1.5"
    implementation "dev.rikka.shizuku:provider:13.1.5"
}
